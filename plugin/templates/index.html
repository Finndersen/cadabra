<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cadabra — parametric model</title>
<!-- ============================================================================
  Cadabra runtime shell. Opens straight from the filesystem (double-click → file://).
  No server required.

  How the file:// loading works (and why it's structured this way):
   - three.js + its examples (OrbitControls, RoomEnvironment) are ES modules. CDN
     https module imports DO work from a file:// page, but LOCAL module files
     (./runtime/runtime.js, ./model.js) do NOT (Chrome blocks them over file://).
   - So: the libraries load via ONE inline <script type="module"> (below) that
     stashes them on window.* . model.js and runtime/runtime.js then load as CLASSIC
     scripts that attach globals (window.MODEL, window.CADABRA) — classic scripts
     load fine over file://.
   - The module boot waits for the classic scripts, then calls CADABRA.boot(...).

  The agent rarely edits this file; the common case is editing model.js.
  runtime/theme.css = design tokens · runtime/runtime.js = the engine · model.js = AGENT-AUTHORED.
============================================================================ -->
<link rel="stylesheet" href="./runtime/theme.css">
</head>
<body>
<div id="app">
  <div id="side">
    <div class="title-row">
      <h1 id="appTitle">Cadabra</h1>
      <button id="reload" title="Reload (apply model.js edits)">⟳ Reload</button>
    </div>
    <div class="sub" id="appSub">Schema-driven parametric model. Edit model.js, then Reload.</div>

    <div class="asm">
      <h2>Assembly</h2>
      <div class="row"><span>Parts</span><b id="aParts">—</b></div>
      <div class="row"><span>Overall height</span><b id="aH">—</b></div>
      <div class="row"><span>Footprint</span><b id="aFP">—</b></div>
      <div class="row"><span>Bill of materials</span><b id="aCost">—</b></div>
      <div class="selrow" style="margin-top:10px">
        <label>Print material (for printed parts)</label>
        <select id="printMat">
          <option value="pla">PLA · 1.24 g/cm³ · $22/kg</option>
          <option value="petg">PETG · 1.27 g/cm³ · $25/kg</option>
          <option value="abs">ABS · 1.04 g/cm³ · $24/kg</option>
          <option value="resin">Resin · 1.10 g/cm³ · $40/kg</option>
        </select>
      </div>
      <div class="prow" style="margin-top:11px">
        <label>Exploded view <span class="u"><span id="vEx">0</span> mm</span></label>
        <div class="pin"><input type="range" id="explode" min="0" max="400" step="5" value="0"></div>
      </div>
      <div class="exp" style="margin-top:11px">
        <button id="cfgSave">Save config…</button>
        <button id="cfgLoad">Load config…</button>
      </div>
      <input type="file" id="cfgFile" accept="application/json,.json" hidden>
      <button class="mini" id="resetAll">Reset everything</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="design">Design</button>
      <button class="tab-btn" data-tab="export">Export</button>
    </div>

    <div id="parts"></div>
    <div id="export" hidden></div>
  </div>

  <div id="view">
    <div id="badge">loading…</div>
    <div id="views">
      <button data-v="iso">Iso</button>
      <button data-v="front">Front</button>
      <button data-v="back">Back</button>
      <button data-v="left">Left</button>
      <button data-v="right">Right</button>
      <button data-v="top">Top</button>
      <button data-v="bottom">Bottom</button>
    </div>
    <div class="hint">left-drag = orbit (model centre) · two-finger scroll = pan · pinch = zoom</div>
  </div>
</div>

<!-- Importmap so esm.sh's `?external=three` deduped helpers resolve `three`.
     (Works over file:// — verified.) -->
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.160.0",
    "three/examples/jsm/controls/OrbitControls.js": "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js?external=three",
    "three/examples/jsm/environments/RoomEnvironment.js": "https://esm.sh/three@0.160.0/examples/jsm/environments/RoomEnvironment.js?external=three"
  }
}
</script>

<!-- Classic scripts: attach window.MODEL and window.CADABRA. Load fine over file://.
     runtime/kernel.js is the kernel tier (replicad/OpenCASCADE WASM in a Blob-URL Web
     Worker) — first-class and lazy: it only defines window.CADABRA_KERNEL, and
     nothing downloads until a kernel part actually calls CADABRA_KERNEL.ready().
     Direct-only projects pay zero cost for it. -->
<script src="./model.js"></script>
<script src="./runtime/kernel.js"></script>
<script src="./runtime/runtime.js"></script>

<!-- The ONLY module on the page: import the CDN libs, hand them to the runtime. -->
<script type="module">
  import * as THREE from "three";
  import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
  import { RoomEnvironment } from "three/examples/jsm/environments/RoomEnvironment.js";
  try {
    window.CADABRA.boot({ THREE, OrbitControls, RoomEnvironment });
  } catch (e) {
    const b = document.getElementById('badge');
    if (b) { b.textContent = 'boot error — see console'; b.style.color = '#ff9d4d'; }
    console.error('Cadabra boot failed:', e);
  }
</script>
</body>
</html>
